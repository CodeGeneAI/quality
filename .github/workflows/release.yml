name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0

jobs:
  release:
    if: ${{ github.repository == 'CodeGeneAI/quality' }}
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: 2479570
          private-key: ${{ secrets.CODEGENEAI_APP_PRIVATE_KEY }}
          # Downscope: by default the minted token inherits ALL of the
          # CodeGeneAI App's installation permissions. release-please needs
          # only these three; everything else is dropped explicitly.
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge on release PR
        if: ${{ steps.release-please.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PLEASE_PR: ${{ steps.release-please.outputs.pr }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number=$(jq -r '.number' <<< "$RELEASE_PLEASE_PR")
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr merge "$pr_number" --auto --squash --repo "$GH_REPO"
          fi

      - uses: actions/checkout@v6
        if: ${{ steps.release-please.outputs.release_created }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release-please.outputs.release_created }}
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release-please.outputs.release_created }}
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        if: ${{ steps.release-please.outputs.release_created }}
        run: bun install --frozen-lockfile

      # actions/setup-node writes an .npmrc with NODE_AUTH_TOKEN and configures
      # npm to use OIDC for Trusted Publishing when id-token: write is set.
      # No NPM_TOKEN secret needed.
      - name: Publish to npm (Trusted Publishing OIDC)
        if: ${{ steps.release-please.outputs.release_created }}
        run: npm publish --provenance --access public
