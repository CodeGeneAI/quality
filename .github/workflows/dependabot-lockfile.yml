name: Sync bun.lock on Dependabot PRs

# Dependabot's npm ecosystem updates package.json but does not touch bun.lock.
# Our CI runs `bun install --frozen-lockfile` and fails when package.json and
# bun.lock are out of sync. This workflow regenerates bun.lock on the PR
# branch and pushes the result, so the required `ci` check can pass.
#
# Triggered on pull_request_target (so it has write permissions even though
# the PR is from a Dependabot-controlled branch). The checkout uses the PR
# head ref and bun install is run with --ignore-scripts as a defensive
# mitigation against postinstall script abuse on untrusted PR content —
# even though Dependabot only opens PRs for existing dependencies, this
# defense-in-depth costs nothing.

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-lockfile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Regenerate bun.lock
        run: bun install --no-frozen-lockfile --ignore-scripts

      - name: Commit bun.lock if changed
        run: |
          if git diff --quiet bun.lock; then
            echo "bun.lock already in sync; nothing to commit."
            exit 0
          fi
          git config user.name 'dependabot[bot]'
          git config user.email '49699333+dependabot[bot]@users.noreply.github.com'
          git add bun.lock
          git commit -m 'chore(deps): sync bun.lock'
          git push
