version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      bun-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Nightly preview build of the TypeScript native compiler (tsgo).
      # Each "update" is just a new date suffix on the same major.minor.
      # Tracking these would mean a weekly Dependabot PR with no semantic
      # change. Bump manually when there's a reason to move to a newer
      # nightly (e.g. a tsgo bugfix).
      - dependency-name: "@typescript/native-preview"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(actions)"
