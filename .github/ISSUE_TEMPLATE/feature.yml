name: Feature request
description: Suggest a new adapter, CLI flag, schema option, or behaviour.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that today's `@codegeneai/quality` makes hard or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, config surface, or behaviour you'd like. Sample `.qualityrc` snippets are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they didn't fit.
    validations:
      required: false

  - type: dropdown
    id: adapter
    attributes:
      label: Affected adapter (if any)
      options:
        - "Not adapter-specific"
        - barrel-exports
        - biome-config
        - biome-ignore
        - bun-native
        - changeset-guard
        - command
        - dockerfile-required
        - dotenv-plaintext
        - dotenv-secrets
        - filenames
        - import-extensions
        - package-catalog
        - package-scripts
        - structure
        - unit-adjacency
        - "New adapter (please describe)"
    validations:
      required: true

  - type: dropdown
    id: implementation
    attributes:
      label: Willing to implement
      description: Are you open to opening a PR if we align on the design?
      options:
        - "Yes, I'd like to implement this"
        - "Maybe, with guidance"
        - "No, requesting only"
    validations:
      required: true
